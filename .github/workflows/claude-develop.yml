name: Claude Develop

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to develop"
        required: true
        type: number

concurrency:
  group: claude-develop-${{ github.event.issue.number || github.event.inputs.issue_number }}
  cancel-in-progress: false

jobs:
  develop:
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'issues' && github.event.label.name == 'claude-develop')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    env:
      COMPOSE_FILE: docker-compose.yaml:docker-compose.override.yaml:docker-compose.test.yaml
      ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create .env file
        run: |
          echo "ENVIRONMENT=${{ secrets.ENVIRONMENT }}" >> .env
          echo "PROJECT_NAME=${{ secrets.PROJECT_NAME }}" >> .env
          echo "STACK_NAME=${{ secrets.STACK_NAME }}" >> .env
          echo "DOMAIN=${{ secrets.DOMAIN }}" >> .env
          echo "VITE_SERVER_URL=${{ secrets.VITE_SERVER_URL }}" >> .env
          echo "BACKEND_CORS_ORIGINS=${{ secrets.BACKEND_CORS_ORIGINS }}" >> .env
          echo "DOMAIN_PORT=${{ secrets.DOMAIN_PORT }}" >> .env
          echo "FIRST_SUPERUSER=${{ secrets.FIRST_SUPERUSER }}" >> .env
          echo "FIRST_SUPERUSER_PASSWORD=${{ secrets.FIRST_SUPERUSER_PASSWORD }}" >> .env
          echo "USE_HASH_ROUTER=${{ secrets.USE_HASH_ROUTER }}" >> .env
          echo "ACCESS_TOKEN_EXPIRE_MINUTES=${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}" >> .env
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
          echo "ALGORITHM=${{ secrets.ALGORITHM }}" >> .env
          echo "FERNET_SECRET=${{ secrets.FERNET_SECRET }}" >> .env
          echo "SMTP_HOST=${{ secrets.SMTP_HOST }}" >> .env
          echo "SMTP_PORT=${{ secrets.SMTP_PORT }}" >> .env
          echo "SMTP_USERNAME=${{ secrets.SMTP_USERNAME }}" >> .env
          echo "SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}" >> .env
          echo "EMAILS_FROM_EMAIL=${{ secrets.EMAILS_FROM_EMAIL }}" >> .env
          echo "EMAILS_FROM_NAME=${{ secrets.EMAILS_FROM_NAME }}" >> .env
          echo "POSTGRES_SERVER=${{ secrets.POSTGRES_SERVER }}" >> .env
          echo "POSTGRES_PORT=${{ secrets.POSTGRES_PORT }}" >> .env
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env

          echo "TEST_POSTGRES_SERVER=db" >> .env
          echo "TEST_POSTGRES_PORT=5432" >> .env
          echo "TEST_POSTGRES_DB=test" >> .env
          echo "TEST_POSTGRES_USER=postgres" >> .env
          echo "TEST_POSTGRES_PASSWORD=changethis" >> .env

      - name: Install playwright-cli
        run: npm install -g @anthropic-ai/playwright-cli@latest

      - name: Build and start Docker services
        run: |
          docker compose build db backend
          docker compose down -v --remove-orphans
          docker compose up -d db backend
          docker compose exec -T backend uv sync --no-install-project

      - name: Run Claude Code (Develop)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--allowed-tools Bash Read Write Edit Grep Glob"
          prompt: |
            You are an autonomous development agent. Your task is to implement the feature or fix described in GitHub issue #${{ env.ISSUE_NUMBER }}.

            ## Step 1: Read the issue

            Run: gh issue view ${{ env.ISSUE_NUMBER }} --repo ${{ github.repository }}

            Read the issue title, body, and labels carefully.

            ## Step 2: Check for dependencies

            Look in the issue body for dependency patterns like:
            - "depends on #X"
            - "after #X"
            - "blocked by #X"

            If you find a dependency on issue #X:
            1. Check if there is a PR for issue #X: `gh pr list --search "Closes #X" --repo ${{ github.repository }} --json number,headRefName,state`
            2. If the dep PR is **merged**: branch from `main` (default behavior)
            3. If the dep PR is **open**: checkout its branch and branch from there. When creating your PR, set the base to the dep's branch.
            4. If no dep PR exists yet: comment on the issue saying the dependency hasn't been started yet, then exit.

            If there are no dependencies, branch from `main`.

            ## Step 3: Create a branch and implement

            Create a branch named: `issue-${{ env.ISSUE_NUMBER }}/<short-slug-from-title>`

            ```bash
            git checkout -b issue-${{ env.ISSUE_NUMBER }}/<slug>
            ```

            Read CLAUDE.md for project conventions. Implement the feature or fix described in the issue.

            Follow these rules:
            - Read existing code before modifying it
            - Follow existing patterns and conventions in the codebase
            - Keep changes minimal and focused on the issue
            - If DB model changes are needed, create an Alembic migration inside Docker:
              `docker compose exec -T backend alembic revision --autogenerate -m "description"`

            ## Step 4: Lint and test

            Run lint:
            ```bash
            docker compose exec -T backend bash /app/scripts/format.sh
            ```

            Run tests:
            ```bash
            docker compose exec -T backend bash /app/scripts/test.sh
            ```

            If lint or tests fail, fix the issues and re-run until they pass. Do not skip or ignore failures.

            ## Step 5: Commit and push

            Stage and commit your changes with a descriptive conventional commit message.
            Push the branch:
            ```bash
            git push -u origin issue-${{ env.ISSUE_NUMBER }}/<slug>
            ```

            ## Step 6: Create a PR

            Determine the appropriate label from the issue labels or content. Use one of: feature, bug, refactor, docs, upgrade, internal.

            Create the PR:
            ```bash
            gh pr create \
              --title "<concise title>" \
              --body "Closes #${{ env.ISSUE_NUMBER }}

            ## Summary
            <bullet points describing what was done>

            ## Test plan
            - [ ] All existing tests pass
            - [ ] New tests added for new functionality (if applicable)

            🤖 Generated by Claude Code automation" \
              --label "<chosen-label>,agent-pr" \
              --repo ${{ github.repository }}
            ```

            If branching from a dependency PR's branch, add `--base <dep-branch-name>` to the PR create command.

      - name: Teardown Docker
        if: always()
        run: docker compose down -v --remove-orphans
