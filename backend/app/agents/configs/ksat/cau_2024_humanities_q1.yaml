name: "KSAT 2024 CAU Humanities Q1"
description: "2024 중앙대학교 인문계 모의논술 문제 1 채점 기준 (40점 만점)"
lang: "ko"
overall_scale_min: 0
overall_scale_max: 40
aggregation: "weighted_average"
rounding: "integer"

system_prompt_template: |
  당신은 대한민국 대학 논술 시험 채점 전문가입니다. 학생의 답안을 채점 기준에 따라 정확하게 평가해야 합니다.

  평가 기준: "{criteria_name}"

  {guidance}

  아래 채점 기준표에 따라 점수를 부여하고, 점수의 근거를 구체적으로 설명하세요. 그리고 답안을 개선할 수 있는 **건설적인 피드백**을 제공하세요.

  **채점 기준표**:
  {band_descriptors}

human_prompt_template: |
  **문제**:
  제시문 (가), (나), (다), (라)에서 등장인물이 거짓된 언행을 하는 '이유'와 이러한 거짓된 언행으로 인해 초래된 '예상과 다른 결과'를 각각 찾아 하나의 완성된 글로 논술하시오. [40점, 550-570자]

  **학생 답안**:
  {student_essay}

aggregator_system_prompt: |
  당신은 대학 논술 시험 채점관입니다.

  채점 결과를 종합하여:
  1. 내용 점수와 논리적 구성 점수를 합산하고 기술적 감점을 적용하세요.
  2. 총점을 40점 만점 기준으로 산출하세요.
  3. 전체적인 평가를 2-3문장으로 요약하세요.
  4. 개별 기준 피드백을 반복하지 말고 종합적으로 서술하세요.

criteria:
  - name: "내용 이해 (제시문 분석)"
    description: "제시문 (가)~(라)에서 거짓된 언행의 이유와 예상과 다른 결과를 정확히 파악했는지 평가"
    weight: 4.0
    scale_min: 0
    scale_max: 32
    guidance: |
      각 제시문에서 거짓된 언행의 '이유'(4점)와 '예상과 다른 결과'(4점)를 정확히 서술했는지 평가합니다.
      - (가): 이유 - 점순이의 부추김에 결혼을 허락받고자 함 / 결과 - 장인이 나를 매질하고 점순이마저 장인 편을 듦
      - (나): 이유 - 조선인에 대한 차별을 벗어나고자 일본인으로 속이고 살려 함 / 결과 - 조선인들을 외면하는 상황에서 내적 고통, 조선인으로서 정체성 재확인
      - (다): 이유 - 집을 구할 수 있는 돈이 필요함 / 결과 - 자신이 아빠를 기다리듯 노부인도 개를 기다린다는 것을 깨닫고 사례금을 포기하고 개를 돌려줌
      - (라): 이유 - 모임 분위기가 어색해지는 것을 막고자 함 / 결과 - 참석자들이 편견을 노골적으로 드러내어 아내의 소외감이 심화되고 분위기가 어색해짐

      배점 가이드:
      - 4개 제시문 모두 서술: 25~32점
      - 3개 제시문 서술: 17~24점
      - 2개 제시문 서술: 9~16점
      - 1개 제시문만 서술: 4~8점
    band_descriptors:
      32: "4개 제시문 모두에서 이유와 예상과 다른 결과를 정확하고 구체적으로 서술"
      24: "3개 제시문에서 정확히 서술하거나 4개 제시문 모두 서술했으나 일부 부정확"
      16: "2개 제시문에서 정확히 서술"
      8: "1개 제시문에서만 서술하거나 전반적으로 부정확"
      0: "제시문의 내용을 전혀 파악하지 못함"

  - name: "논리적 구성"
    description: "서론-본론-결론 구성과 결론에서의 핵심 표현 요약 제시 여부 평가"
    weight: 1.0
    scale_min: 0
    scale_max: 8
    guidance: |
      글의 논리적 구성을 평가합니다.
      - 서론-본론-결론의 논리적 구성 여부 (1~3점)
      - 결론에서 각 제시문의 차이를 핵심 표현으로 요약 제시 여부 (2~5점)
        - 거짓된 언행의 이유 핵심어: 결혼, 돈, 차별, 어색함(불편함)
        - 예상과 다른 결과 핵심어: 허탈감, 정체성 확인, 삶의 가치 인식, 상황의 악화

      매우 논리적이거나 창의적인 경우 최대 5점 가산, 논리적이지 못할 경우 최대 5점 감점 가능.
    band_descriptors:
      8: "서론-본론-결론이 명확하고 결론에서 핵심 표현으로 체계적으로 요약"
      5: "기본적인 구성은 갖추었으나 결론의 요약이 미흡"
      3: "구성이 불완전하고 결론이 부실"
      0: "글의 구성이 전혀 논리적이지 않음"

  - name: "기술적 감점"
    description: "글자 수 위반, 맞춤법 오류, 제시문 그대로 옮겨 쓴 경우 감점"
    weight: 0.0
    scale_min: -10
    scale_max: 0
    guidance: |
      기술적 측면의 감점 요소를 평가합니다 (감점만 적용, 0이 최고점).
      - 글자 수 위반: ±1~25자 = -1점, ±26자 이상 = -2점 (기준: 550-570자)
      - 맞춤법/원고지 사용법 중대한 오류: 최대 -3점
      - 제시문을 한 문장 이상 그대로 옮겨 쓴 경우: 최대 -5점
    band_descriptors:
      0: "기술적 오류 없음"
      -2: "경미한 글자 수 위반 또는 맞춤법 오류"
      -5: "글자 수 위반과 맞춤법 오류가 함께 있음"
      -10: "심각한 기술적 오류 (제시문 그대로 복사 포함)"
