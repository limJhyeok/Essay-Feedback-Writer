name: "KSAT 2024 CAU Humanities Q2"
description: "2024 중앙대학교 인문계 모의논술 문제 2 채점 기준 (40점 만점)"
lang: "ko"
overall_scale_min: 0
overall_scale_max: 40
aggregation: "weighted_average"
rounding: "integer"

system_prompt_template: |
  당신은 대한민국 대학 논술 시험 채점 전문가입니다. 학생의 답안을 채점 기준에 따라 정확하게 평가해야 합니다.

  평가 기준: "{criteria_name}"

  {guidance}

  아래 채점 기준표에 따라 점수를 부여하고, 점수의 근거를 구체적으로 설명하세요. 그리고 답안을 개선할 수 있는 **건설적인 피드백**을 제공하세요.

  **채점 기준표**:
  {band_descriptors}

human_prompt_template: |
  **문제**:
  제시문 (마)와 제시문 (바)를 통합적으로 고려하여 제시문 (라)의 모임 참석자들이 채식주의자인 '아내'를 대하는 태도를 비판하고, 모임 참석자들과 아내가 서로를 이해하기 위해 각각 어떤 노력을 해야 하는지를 제시문 (사)를 토대로 서술하시오. [40점, 550-570자]

  **학생 답안**:
  {student_essay}

aggregator_system_prompt: |
  당신은 대학 논술 시험 채점관입니다.

  채점 결과를 종합하여:
  1. 비판 영역과 상호 이해 영역의 점수를 합산하고 기술적 감점을 적용하세요.
  2. 총점을 40점 만점 기준으로 산출하세요.
  3. 전체적인 평가를 2-3문장으로 요약하세요.
  4. 개별 기준 피드백을 반복하지 말고 종합적으로 서술하세요.

criteria:
  - name: "참석자 태도 비판 ((마)·(바) 통합)"
    description: "(마)와 (바)를 통합적으로 고려하여 채식주의자 '아내'에 대한 모임 참석자들의 태도를 비판했는지 평가"
    weight: 3.0
    scale_min: 0
    scale_max: 24
    guidance: |
      (마)와 (바)의 논지를 파악하고 이를 통합해 (라)의 모임 참석자들이 '아내'를 대하는 태도를 비판했는지 평가합니다.

      - (마)·(바)의 논지 파악 (10점):
        - (마): 대상에 대한 인지와 분별이 상대적이라는 장자의 철학, 인간의 기본 욕구를 억압하는 모든 폭력을 제거해야 한다는 갈퉁의 주장
        - (바): 통념이 인간을 억압하고, 대상에 대한 인식이 시대적 맥락에 따라 변할 수 있음
      - 비판 ① (7점): 육식은 인간의 본능이라는 통념을 절대적으로 생각하고, 자기중심적 관점에서 채식주의를 비정상적이라고 평가하는 점
      - 비판 ② (7점): 아내의 기본적 욕구를 존중하지 않는 것 자체가 폭력임을 인식하지 못하고, 소수자의 취향을 억압하는 언어적·문화적 폭력을 가함

      배점 가이드:
      - 상(20~24점): (마)·(바)의 논지를 정확히 이해하고 통합적 관점에서 비판
      - 중(15~20점): 논지는 파악했으나 통합적 관점 없이 각각 서술
      - 하(3~15점): 논지 파악 부족, 통합적 비판 없음
    band_descriptors:
      24: "(마)·(바)의 논지를 정확히 요약하고 통합해 참석자들의 태도를 체계적으로 비판"
      20: "논지 요약은 간소하지만 통합적 비판이 잘 드러남"
      15: "논지는 파악했으나 통합적 관점 없이 각각 서술"
      8: "논지 파악이 일부에 그치고 비판이 불충분"
      3: "제시문의 논지를 제대로 파악하지 못하고 통합적 관점도 없음"
      0: "비판 내용이 전혀 없음"

  - name: "상호 이해를 위한 노력 ((사) 활용)"
    description: "(사)를 토대로 참석자들과 아내가 서로를 이해하기 위해 각각 해야 할 노력을 서술했는지 평가"
    weight: 2.0
    scale_min: 0
    scale_max: 16
    guidance: |
      (사)를 토대로 모임 참석자들과 아내가 서로를 이해하기 위해 각각 어떤 노력을 해야 하는지 서술했는지 평가합니다.

      - 모임 참석자들의 태도 (10점):
        - 자신들과 비슷한 생각·취향을 가진 사람끼리만 소통하여 사고가 편향되는 것을 피해야 함
        - 자신과 다른 의견을 가진 소수자들의 의견을 존중해야 함
        - 통설을 강요하는 방식으로 소수자를 억압하지 말아야 함
      - 아내의 태도 (6점): 다수 집단과의 대화를 회피하지 말고 상대방을 설득하려고 목소리를 내야 함

      배점 가이드:
      - 상(12~16점): (사)를 토대로 양쪽 태도를 모두 정확히 서술
      - 중(8~12점): 서술했으나 한 쪽 주제가 충분치 않음
      - 하(3~8점): (사)의 핵심 내용을 활용하지 못하고 양쪽 태도 모두 불명확
    band_descriptors:
      16: "(사)의 내용을 토대로 참석자와 아내가 각각 가져야 할 태도를 구체적이고 정확하게 서술"
      12: "양쪽 태도를 서술했으나 한 쪽이 충분하지 않음"
      8: "한 쪽 태도만 적절히 서술되고 다른 쪽은 부실"
      3: "(사)의 핵심 내용을 활용하지 못함"
      0: "상호 이해를 위한 노력 서술이 전혀 없음"

  - name: "기술적 감점"
    description: "글자 수 위반, 맞춤법 오류, 제시문 그대로 옮겨 쓴 경우 감점"
    weight: 0.0
    scale_min: -10
    scale_max: 0
    guidance: |
      기술적 측면의 감점 요소를 평가합니다 (감점만 적용, 0이 최고점).
      - 글자 수 위반: ±1~25자 = -1점, ±26자 이상 = -2점 (기준: 550-570자)
      - 맞춤법/원고지 사용법 중대한 오류: 최대 -3점
      - 제시문을 한 문장 이상 그대로 옮겨 쓴 경우: 최대 -5점
    band_descriptors:
      0: "기술적 오류 없음"
      -2: "경미한 글자 수 위반 또는 맞춤법 오류"
      -5: "글자 수 위반과 맞춤법 오류가 함께 있음"
      -10: "심각한 기술적 오류 (제시문 그대로 복사 포함)"
