name: "KSAT 2024 CAU Humanities Q3"
description: "2024 중앙대학교 인문계 모의논술 문제 3 채점 기준 (20점 만점)"
lang: "ko"
overall_scale_min: 0
overall_scale_max: 20
aggregation: "weighted_average"
rounding: "integer"

system_prompt_template: |
  당신은 대한민국 대학 논술 시험 채점 전문가입니다. 학생의 답안을 채점 기준에 따라 정확하게 평가해야 합니다.

  평가 기준: "{criteria_name}"

  {guidance}

  아래 채점 기준표에 따라 점수를 부여하고, 점수의 근거를 구체적으로 설명하세요. 그리고 답안을 개선할 수 있는 **건설적인 피드백**을 제공하세요.

  **채점 기준표**:
  {band_descriptors}

human_prompt_template: |
  **문제**:
  제시문 (아)에서 설명된 '루틴'과 '징크스'의 공통점과 차이점을 서술하고, 목표한 바를 이루고자 할 때 지녀야 할 자세를 제시문 (자)와 제시문 (차)를 각각 고려하여 서술하시오. [20점, 330-350자]

  **학생 답안**:
  {student_essay}

aggregator_system_prompt: |
  당신은 대학 논술 시험 채점관입니다.

  채점 결과를 종합하여:
  1. 공통점·차이점 영역과 목표 달성 자세 영역의 점수를 합산하고 기술적 감점을 적용하세요.
  2. 총점을 20점 만점 기준으로 산출하세요.
  3. 전체적인 평가를 2-3문장으로 요약하세요.
  4. 개별 기준 피드백을 반복하지 말고 종합적으로 서술하세요.

criteria:
  - name: "루틴과 징크스의 공통점·차이점 ((아) 활용)"
    description: "제시문 (아)를 토대로 '루틴'과 '징크스'의 공통점과 차이점을 파악했는지 평가"
    weight: 1.0
    scale_min: 0
    scale_max: 10
    guidance: |
      제시문 (아)에서 '루틴'과 '징크스'의 공통점과 차이점을 정확히 파악했는지 평가합니다.
      - 공통점: 경기에서 이기려는 열망에서 비롯됨
      - 차이점: 루틴은 최상의 상태를 유지하는 데 도움이 되어 반복적으로 해야 하는 행동·말, 징크스는 행동과 실패 사이에 과도한 인과 관계를 부여해 패배하지 않기 위해 피해야 하는 행동

      배점 가이드:
      - 공통점과 차이점 모두 서술: 10점
      - 공통점·차이점을 서술했으나 차이점 서술 불충분: 7점
      - 공통점·차이점 중 한 측면만 서술: 5점
    band_descriptors:
      10: "공통점과 차이점을 모두 구체적이고 정확하게 서술"
      7: "공통점·차이점을 서술했으나 차이점에 대한 서술이 불충분"
      5: "공통점·차이점 중 한 측면만 서술"
      3: "서술이 피상적이거나 부정확"
      0: "공통점·차이점 서술이 전혀 없음"

  - name: "목표 달성을 위한 자세 ((자)·(차) 활용)"
    description: "제시문 (자)와 (차)를 각각 고려하여 목표한 바를 이루고자 할 때 지녀야 할 자세를 서술했는지 평가"
    weight: 1.0
    scale_min: 0
    scale_max: 10
    guidance: |
      제시문 (자)와 (차)를 각각 고려해 목표한 바를 이루고자 할 때 지녀야 할 자세를 서술했는지 평가합니다.
      - (자): 실패를 하더라도 그 경험을 통해 성공의 방법을 찾아내야 하며, 꿈을 간직함으로써 실패의 고통을 이겨내고 도전하는 자세
      - (차): 분명한 목표를 세우는 것, 자신을 도와줄 조력자를 찾아보는 것, 간절한 마음을 갖는 것, 꾸준한 연습을 하는 것, 이를 통해 실력을 쌓는 것

      배점 가이드:
      - (자)와 (차)에서 목표 달성에 필요한 자세를 모두 찾아 서술: 8~10점
      - (자)·(차)의 내용을 서술했으나 각 제시문에서 파악한 내용이 충분치 않음: 5~7점
      - 두 제시문에서 파악한 내용이 모두 충분하지 않음: 3~4점
    band_descriptors:
      10: "(자)·(차) 모두에서 필요한 자세를 구체적으로 찾아 서술"
      7: "(자)·(차)의 내용을 서술했으나 일부가 충분치 않음"
      4: "(자) 또는 (차) 내용이 피상적이고 한쪽으로 치우침"
      3: "두 제시문에서 파악한 내용이 모두 불충분"
      0: "(자)·(차)와 연결된 자세 서술이 전혀 없음"

  - name: "기술적 감점"
    description: "글자 수 위반, 맞춤법 오류, 제시문 그대로 옮겨 쓴 경우 감점"
    weight: 0.0
    scale_min: -10
    scale_max: 0
    guidance: |
      기술적 측면의 감점 요소를 평가합니다 (감점만 적용, 0이 최고점).
      - 글자 수 위반: ±1~25자 = -1점, ±26자 이상 = -2점 (기준: 330-350자)
      - 맞춤법/원고지 사용법 중대한 오류: 최대 -3점
      - 제시문을 한 문장 이상 그대로 옮겨 쓴 경우: 최대 -5점
    band_descriptors:
      0: "기술적 오류 없음"
      -2: "경미한 글자 수 위반 또는 맞춤법 오류"
      -5: "글자 수 위반과 맞춤법 오류가 함께 있음"
      -10: "심각한 기술적 오류 (제시문 그대로 복사 포함)"
