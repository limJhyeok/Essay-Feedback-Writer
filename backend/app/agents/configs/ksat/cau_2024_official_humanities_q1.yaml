name: "KSAT 2024 CAU Official Humanities Q1"
description: "2024 중앙대학교 인문사회계열 본고사 논술 문제 1 채점 기준 (40점 만점)"
lang: "ko"
overall_scale_min: 0
overall_scale_max: 40
aggregation: "weighted_sum"
rounding: "integer"

system_prompt_template: |
  당신은 대한민국 대학 논술 시험 채점 전문가입니다. 학생의 답안을 채점 기준에 따라 정확하게 평가해야 합니다.

  이 문항은 제시문 (가)~(라)에서 화자가 특정한 대상이나 상황의 비교를 통해 발견한 '차이점'과 이로 인해 '깨달은 것'을 각각 찾아 서론-본론-결론을 갖춘 하나의 완성된 글로 논술하는 과제입니다.

  평가 기준: "{criteria_name}"

  {guidance}

  아래 채점 기준표에 따라 점수를 부여하고, 점수의 근거를 구체적으로 설명하세요. 그리고 답안을 개선할 수 있는 **건설적인 피드백**을 한국어로 제공하세요.

  **채점 기준표**:
  {band_descriptors}

human_prompt_template: |
  **문제**:
  제시문 (가)~(라)에는 특정한 대상이나 상황이 서로 비교되는 다양한 모습이 나타난다. 제시문 (가), (나), (다), (라)에서 화자가 비교를 통해 발견한 '차이점'과 이로 인해 '깨달은 것'을 각각 찾아 하나의 완성된 글로 논술하시오. [40점, 550-570자]

  **학생 답안**:
  {student_essay}

aggregator_system_prompt: |
  당신은 대학 논술 시험 채점관입니다.

  채점 결과를 종합하여:
  1. 내용 점수와 논리적 구성 점수를 합산하고 기술적 감점을 적용하세요.
  2. 총점을 40점 만점 기준으로 산출하세요.
  3. 전체적인 평가를 2-3문장으로 요약하세요.
  4. 개별 기준 피드백을 반복하지 말고 종합적으로 서술하세요.

criteria:
  - name: "내용 이해 (제시문별 차이점·깨달음)"
    description: "제시문 (가)~(라)에서 화자가 발견한 '차이점'과 '깨달은 것'을 각각 정확히 서술했는지 평가 (32점)"
    weight: 1.0
    scale_min: 0
    scale_max: 32
    guidance: |
      각 제시문에서 '차이점'(4점)과 '깨달은 것'(4점)을 정확히 서술했는지 평가합니다 (제시문당 8점, 4개 제시문 총 32점).

      - **(가) 신영복, 「새 출발점에 선 당신에게」**
        - 차이점: 목수가 집을 짓는 순서대로 주춧돌부터 그리는 반면 자신은 지붕부터 집을 그림
        - 깨달은 것: 이론보다 현장의 경험과 실천적 삶이 중요함
      - **(나) 오주석, 「미완성의 걸작」**
        - 차이점: 현재의 윤두서 자화상과 옛 사진 속 그림을 비교해 상반신 윤곽선의 유무, 인상과 분위기의 상이함
        - 깨달은 것: 작가의 의도와 성찰의 과정이 남은 미완성작도 예술성이 높을 수 있음
      - **(다) 나희덕, 「반통의 물」**
        - 차이점: '나'에 비해 할아버지가 두 배나 더 힘들게 일한다는 점
        - 깨달은 것: 수고로움에 차이가 있더라도 생명을 돌보는 진정성 있는 마음은 다르지 않음
      - **(라) 김남희, 「왜 당신의 시간을 즐기지 않나요」**
        - 차이점: 부탄 사람들은 가난해도 욕심 없이 여유롭게 살지만, 우리는 많이 가져도 더 갖고자 조급하게 삶
        - 깨달은 것: 경제적 풍요와 상관없이 나눔과 만족이 진정한 행복임

      **배점 가이드** (4개 제시문 × (차이점 4점 + 깨달음 4점) = 32점):
      - 4개 제시문 모두 차이점·깨달음을 제시: 25~32점
      - 3개 제시문에서 제시: 17~24점
      - 2개 제시문에서 제시: 9~16점
      - 1개 제시문에서만 제시: 4~8점
    band_descriptors:
      32: "4개 제시문 모두에서 차이점과 깨달은 것을 정확하고 구체적으로 서술"
      25: "4개 제시문을 다루었으나 일부 제시문에서 구체성이 부족"
      20: "3개 제시문에서 정확히 서술"
      12: "2개 제시문에서 정확히 서술"
      6: "1개 제시문에서만 서술하거나 전반적으로 피상적"
      0: "제시문의 차이점·깨달음을 전혀 파악하지 못함"

  - name: "논리적 구성"
    description: "서론-본론-결론 구성과 결론에서의 핵심 요약 제시 여부 평가 (8점)"
    weight: 1.0
    scale_min: 0
    scale_max: 8
    guidance: |
      네 제시문의 차이점·깨달음을 하나의 완성된 글(서론/본론/결론)로 논리적으로 구성했는지 평가합니다.
      - 서론-본론-결론의 논리적 구성 여부 (1~3점)
      - 결론에서 각 제시문의 차이와 깨달음이 핵심적 표현으로 요약 제시되었는지 (2~5점)

      **예시**
      - 서론: "제시문 (가)~(라)에는 비교를 통해 차이점을 발견하고 깨달음을 얻는 모습이 나타난다."
      - 결론: "따라서 화자는 그리는 순서, 그림의 상태, 수고로움, 삶의 방식에서 차이점을 찾고 이를 통해 실천, 예술성, 생명, 행복의 의미를 깨달았다."

      ※ 글이 매우 논리적이거나 창의적일 경우 최대 5점 가산, 논리적이지 못할 경우 최대 5점 감점 가능.
    band_descriptors:
      8: "서론-본론-결론이 명확하고 결론에서 핵심 표현으로 체계적으로 요약"
      5: "기본적인 구성은 갖추었으나 결론의 요약이 부분적"
      3: "구성이 불완전하고 결론이 부실"
      1: "도입·결말 중 하나만 존재"
      0: "글의 구성이 전혀 논리적이지 않음"

  - name: "기술적 감점"
    description: "글자 수 위반, 맞춤법 오류, 제시문 그대로 옮겨 쓴 경우 감점 (최대 -5점, 0이 최고점)"
    weight: 1.0
    scale_min: -10
    scale_max: 0
    guidance: |
      기술적 측면의 감점 요소를 평가합니다 (감점만 적용, 0이 최고점).
      - 글자 수 위반 (기준 550-570자): ±1~25자 = -1점, ±26자 이상 = -2점
      - 맞춤법/원고지 사용법 중대한 오류: 최대 -3점
      - 제시문을 한 문장 이상 그대로 옮겨 쓴 경우: 최대 -5점
    band_descriptors:
      0: "기술적 오류 없음"
      -2: "경미한 글자 수 위반 또는 맞춤법 오류"
      -5: "글자 수 위반·맞춤법 오류·제시문 복사 중 두 가지가 함께"
      -10: "심각한 기술적 오류 (제시문 그대로 복사 포함)"
