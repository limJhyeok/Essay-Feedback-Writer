name: "KSAT 2024 CAU Official Humanities Q2"
description: "2024 중앙대학교 인문사회계열 본고사 논술 문제 2 채점 기준 (40점 만점)"
lang: "ko"
overall_scale_min: 0
overall_scale_max: 40
aggregation: "weighted_sum"
rounding: "integer"

system_prompt_template: |
  당신은 대한민국 대학 논술 시험 채점 전문가입니다. 학생의 답안을 채점 기준에 따라 정확하게 평가해야 합니다.

  이 문항은 (1) 제시문 (마)의 여유 개념을 토대로 (라)의 부탄 사람들의 '삶의 여유'를 평가하고, (2) 제시문 (바)와 (사)를 각각 고려해 (라)의 '우리'에게 필요한 삶의 자세를 서술하는 2단 구성 과제입니다.

  평가 기준: "{criteria_name}"

  {guidance}

  아래 채점 기준표에 따라 점수를 부여하고, 점수의 근거를 구체적으로 설명하세요. 그리고 답안을 개선할 수 있는 **건설적인 피드백**을 한국어로 제공하세요.

  **채점 기준표**:
  {band_descriptors}

human_prompt_template: |
  **문제**:
  제시문 (라)에 나타난 부탄 사람들의 '삶의 여유'를 제시문 (마)의 내용을 토대로 평가하고, 제시문 (라)에 언급된 '우리'에게 필요한 삶의 자세를 제시문 (바)와 (사)를 각각 고려하여 서술하시오. [40점, 550-570자]

  **학생 답안**:
  {student_essay}

aggregator_system_prompt: |
  당신은 대학 논술 시험 채점관입니다.

  채점 결과를 종합하여:
  1. 부탄 사람들의 삶의 여유 평가 점수와 '우리'에게 필요한 자세 점수를 합산하고 기술적 감점을 적용하세요.
  2. 총점을 40점 만점 기준으로 산출하세요.
  3. 전체적인 평가를 2-3문장으로 요약하세요.
  4. 개별 기준 피드백을 반복하지 말고 종합적으로 서술하세요.

criteria:
  - name: "부탄 사람들의 '삶의 여유' 평가 ((마) 적용)"
    description: "(마)의 여유 개념을 토대로 (라)의 부탄 사람들의 삶의 여유를 평가했는지 평가 (20점)"
    weight: 1.0
    scale_min: 0
    scale_max: 20
    guidance: |
      제시문 (마)의 '물질적 여유 / 시간적 여유 / 마음의 상태로서의 여유' 개념을 토대로 (라)의 부탄 사람들의 삶의 여유를 평가했는지 확인합니다.

      - ① (라) 부탄 사람들의 삶의 태도 혹은 여유 설명 (5점)
        : 가난하지만 욕심 없이 여유롭게 살며 여행객에게도 친절하게 베풂
      - ② (마)의 세 가지 여유(물질·시간·마음) 개념으로 (라) 부탄 사람들의 여유를 각각 판단 (10점)
        - 물질적 여유: 가난하여 결여됨
        - 시간적 여유: 몸을 바쁘게 움직여야 일상이 영위되므로 결여됨
        - 마음의 여유: 충분히 지님
      - ③ 물질·시간 여유가 없어도 '마음의 여유' 덕분에 타인에게 친절하고 삶을 향유할 수 있다는 결론 도출 (5점)

      배점 가이드:
      - 상(16~20점): 세 여유 개념으로 각각 평가하고 결론까지 도출
      - 중(10~15점): 두 여유 개념 평가 또는 결론이 불충분
      - 하(3~9점): (마)의 개념 활용이 피상적이거나 (라) 설명 부족
    band_descriptors:
      20: "(마)의 세 여유 개념으로 (라)를 각각 평가하고 '마음의 여유 덕에 행복함'이라는 결론 도출"
      15: "세 여유 개념을 활용했으나 결론이 간소하거나 일부 개념이 약함"
      10: "두 여유 개념 정도로 평가, 결론이 미흡"
      5: "(마) 개념 활용이 피상적이거나 (라) 설명이 부족"
      0: "(마)를 활용한 평가가 전혀 없음"

  - name: "'우리'에게 필요한 자세 ((바)·(사) 활용)"
    description: "(바)와 (사)를 각각 고려하여 (라)의 '우리'에게 필요한 삶의 자세를 서술했는지 평가 (20점)"
    weight: 1.0
    scale_min: 0
    scale_max: 20
    guidance: |
      제시문 (바)와 (사)의 논지를 정확히 파악하고, 이를 바탕으로 (라)의 '우리'에게 필요한 삶의 자세를 서술했는지 평가합니다.

      - ① (바) 논지 (5점): 바쁜 일상을 잠시 멈추고 마음을 내려놓은 채 세상을 바라볼 시간을 가져야 함 (쿠빼 씨가 노숙으로부터 얻은 깨달음)
      - ② (사) 논지 (5점): 물질을 소유하는 삶(소유 양식)이 아닌 존재 자체를 추구하는 삶(존재 양식)을 지향해야 함
      - ③ (라)의 '우리'에게 필요한 자세 (10점):
        - (바)의 관점: 지금의 순간 자체에 집중해 근원적 행복감을 느낄 수 있는 여유 있는 자세
        - (사)의 관점: 소유의 집착에서 벗어나 주체적 삶을 살 수 있는 존재 양식의 삶의 자세

      배점 가이드:
      - 상(16~20점): (바)·(사) 논지를 모두 파악하고 '우리'에게 필요한 자세를 구체적으로 서술
      - 중(10~15점): 한 제시문 쪽이 약하거나 '우리'에게의 적용이 간소
      - 하(3~9점): 논지 파악이 부분적이거나 '우리'에게의 연결이 불명확
    band_descriptors:
      20: "(바)·(사) 논지를 모두 정확히 파악하고 '우리'에게 필요한 자세를 구체적으로 도출"
      15: "논지 파악은 양호하나 한쪽 적용이 간소"
      10: "한 제시문의 논지·적용만 적절, 다른 쪽은 부실"
      5: "논지 파악 또는 '우리'에게의 연결이 피상적"
      0: "(바)·(사)를 활용한 자세 서술이 전혀 없음"

  - name: "기술적 감점"
    description: "글자 수 위반, 맞춤법 오류, 제시문 그대로 옮겨 쓴 경우 감점 (최대 -5점, 0이 최고점)"
    weight: 1.0
    scale_min: -10
    scale_max: 0
    guidance: |
      기술적 측면의 감점 요소를 평가합니다 (감점만 적용, 0이 최고점).
      - 글자 수 위반 (기준 550-570자): ±1~25자 = -1점, ±26자 이상 = -2점
      - 맞춤법/원고지 사용법 중대한 오류: 최대 -3점
      - 제시문을 한 문장 이상 그대로 옮겨 쓴 경우: 최대 -5점
    band_descriptors:
      0: "기술적 오류 없음"
      -2: "경미한 글자 수 위반 또는 맞춤법 오류"
      -5: "글자 수 위반·맞춤법 오류·제시문 복사 중 두 가지가 함께"
      -10: "심각한 기술적 오류 (제시문 그대로 복사 포함)"
