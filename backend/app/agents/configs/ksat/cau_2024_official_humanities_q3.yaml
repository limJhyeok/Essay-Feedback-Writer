name: "KSAT 2024 CAU Official Humanities Q3"
description: "2024 중앙대학교 인문사회계열 본고사 논술 문제 3 채점 기준 (20점 만점)"
lang: "ko"
overall_scale_min: 0
overall_scale_max: 20
aggregation: "weighted_sum"
rounding: "integer"

system_prompt_template: |
  당신은 대한민국 대학 논술 시험 채점 전문가입니다. 학생의 답안을 채점 기준에 따라 정확하게 평가해야 합니다.

  이 문항은 (1) 제시문 (아)의 편의점 서비스 공급자와 (자)의 누리 소통망(SNS) 뉴스 공급자가 이용자를 대하는 '전략의 차이'를 기술하고, (2) 제시문 (차)를 토대로 (자)의 가짜 뉴스에 대처하기 위해 우리 사회에 필요한 것을 서술하는 과제입니다.

  평가 기준: "{criteria_name}"

  {guidance}

  아래 채점 기준표에 따라 점수를 부여하고, 점수의 근거를 구체적으로 설명하세요. 그리고 답안을 개선할 수 있는 **건설적인 피드백**을 한국어로 제공하세요.

  **채점 기준표**:
  {band_descriptors}

human_prompt_template: |
  **문제**:
  제시문 (아)의 편의점 서비스 공급자와 제시문 (자)의 누리 소통망(SNS)의 뉴스 공급자가 이용자를 대하는 '전략의 차이'를 기술하고, 제시문 (자)의 가짜 뉴스에 대처하기 위해 우리 사회에 필요한 것이 무엇인지 제시문 (차)를 토대로 서술하시오. [20점, 330-350자]

  **학생 답안**:
  {student_essay}

aggregator_system_prompt: |
  당신은 대학 논술 시험 채점관입니다.

  채점 결과를 종합하여:
  1. 전략 차이 서술 점수와 가짜 뉴스 대처 방안 점수를 합산하고 기술적 감점을 적용하세요.
  2. 총점을 20점 만점 기준으로 산출하세요.
  3. 전체적인 평가를 2-3문장으로 요약하세요.
  4. 개별 기준 피드백을 반복하지 말고 종합적으로 서술하세요.

criteria:
  - name: "전략의 차이 기술 ((아)·(자) 논지)"
    description: "편의점 서비스 공급자와 SNS 뉴스 공급자가 이용자를 대하는 전략의 차이를 정확히 기술했는지 평가 (14점)"
    weight: 1.0
    scale_min: 0
    scale_max: 14
    guidance: |
      제시문 (아)와 (자)를 대조하여 두 공급자가 이용자를 대하는 전략의 차이를 정확히 서술했는지 평가합니다.

      - ① (아) 편의점 서비스 공급자의 전략 (7점):
        의도적 무관심을 통해 이용자의 익명성을 보장하고, 규격화된 상호작용 지침에 따라 **표준화된 서비스**를 제공하는 전략
      - ② (자) 누리 소통망 뉴스 공급자의 전략 (7점):
        사람들의 관심을 끌기 위해 개개인의 취향 차를 고려해 뉴스를 선별 제공하는 **이용자 맞춤형** 전략

      배점 가이드:
      - 상(11~14점): 표준화 vs 맞춤형이라는 대조를 양쪽 모두 정확히 제시
      - 중(7~10점): 한쪽 전략은 명확하나 다른 쪽이 피상적
      - 하(3~6점): 대조가 불분명하거나 단순 요약 수준
    band_descriptors:
      14: "표준화(아) vs 이용자 맞춤형(자)이라는 대조를 양쪽 모두 구체적이고 명료하게 서술"
      11: "양쪽 전략을 서술했으나 한쪽이 다소 간소"
      7: "한쪽 전략만 명확, 다른 쪽은 피상적"
      4: "대조 관점이 불분명하거나 단순 요약"
      0: "전략의 차이를 기술하지 못함"

  - name: "가짜 뉴스 대처 방안 ((차) 활용)"
    description: "제시문 (차)에서 우리 사회가 가짜 뉴스에 대처하기 위해 필요한 것을 찾아 서술했는지 평가 (6점)"
    weight: 1.0
    scale_min: 0
    scale_max: 6
    guidance: |
      제시문 (차)의 매체 윤리에서 세 가지 요소를 찾아 요약·정리했는지 평가합니다 (각 2점).

      - ① 개인 정보 보호를 통한 **인격권 보장** (2점)
      - ② 타인의 권리·공익을 침해하지 않는 선에서 **표현의 자유의 한계 인식** (2점)
      - ③ 정보를 비판적으로 활용하는 **매체 이해력(미디어 리터러시)** 신장 (2점)

      배점 가이드:
      - 상(5~6점): 세 요소를 모두 적절히 요약·제시
      - 중(3~4점): 두 요소를 제시
      - 하(1~2점): 한 요소만 제시하거나 내용이 피상적
    band_descriptors:
      6: "인격권 보장·표현의 자유 한계·매체 이해력 세 요소를 모두 명료하게 서술"
      4: "세 요소 중 두 가지를 적절히 서술"
      2: "한 요소만 서술되거나 내용이 피상적"
      0: "(차) 기반 대처 방안을 전혀 서술하지 못함"

  - name: "기술적 감점"
    description: "글자 수 위반, 맞춤법 오류, 제시문 그대로 옮겨 쓴 경우 감점 (최대 -5점, 0이 최고점)"
    weight: 1.0
    scale_min: -10
    scale_max: 0
    guidance: |
      기술적 측면의 감점 요소를 평가합니다 (감점만 적용, 0이 최고점).
      - 글자 수 위반 (기준 330-350자): ±1~25자 = -1점, ±26자 이상 = -2점
      - 맞춤법/원고지 사용법 중대한 오류: 최대 -3점
      - 제시문을 한 문장 이상 그대로 옮겨 쓴 경우: 최대 -5점
    band_descriptors:
      0: "기술적 오류 없음"
      -2: "경미한 글자 수 위반 또는 맞춤법 오류"
      -5: "글자 수 위반·맞춤법 오류·제시문 복사 중 두 가지가 함께"
      -10: "심각한 기술적 오류 (제시문 그대로 복사 포함)"
