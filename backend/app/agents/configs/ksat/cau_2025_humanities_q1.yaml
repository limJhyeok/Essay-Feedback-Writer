name: "KSAT 2025 CAU Humanities Q1"
description: "2025 중앙대학교 인문계 모의논술 문제 1 채점 기준 (40점 만점)"
lang: "ko"
overall_scale_min: 0
overall_scale_max: 40
aggregation: "weighted_average"
rounding: "integer"

system_prompt_template: |
  당신은 대한민국 대학 논술 시험 채점 전문가입니다. 학생의 답안을 채점 기준에 따라 정확하게 평가해야 합니다.

  평가 기준: "{criteria_name}"

  {guidance}

  아래 채점 기준표에 따라 점수를 부여하고, 점수의 근거를 구체적으로 설명하세요. 그리고 답안을 개선할 수 있는 **건설적인 피드백**을 제공하세요.

  **채점 기준표**:
  {band_descriptors}

human_prompt_template: |
  **문제**:
  제시문 (가), (나), (다), (라)에서 등장인물이 두려움을 느끼는 '이유'와 두려움을 '극복한 방법'을 각각 찾아 하나의 완성된 글로 논술하시오. [40점, 550-570자]

  **학생 답안**:
  {student_essay}

aggregator_system_prompt: |
  당신은 대학 논술 시험 채점관입니다.

  채점 결과를 종합하여:
  1. 내용 점수와 논리적 구성 점수를 합산하고 기술적 감점을 적용하세요.
  2. 총점을 40점 만점 기준으로 산출하세요.
  3. 전체적인 평가를 2-3문장으로 요약하세요.
  4. 개별 기준 피드백을 반복하지 말고 종합적으로 서술하세요.

criteria:
  - name: "내용 이해 (제시문 분석)"
    description: "제시문 (가)~(라)에서 두려움의 이유와 극복 방법을 정확하게 파악했는지 평가"
    weight: 4.0
    scale_min: 0
    scale_max: 32
    guidance: |
      각 제시문에서 두려움의 '이유'와 '극복 방법'을 정확히 서술했는지 평가합니다.
      - (가): 이유 - 강물의 소용돌이와 소리에 압도, 극복 - 주관적 판단임을 깨닫고 마음 다스림
      - (나): 이유 - 미안하다는 말을 결함 인정으로 여김, 극복 - 관계적 가치 인식과 의미 재해석
      - (다): 이유 - 다문화 가정 아이로서 편견, 극복 - 신뢰하는 사람을 믿고 함께 도전
      - (라): 이유 - 테러로 인한 죽음의 공포 실감, 극복 - 가족의 지지와 연대 활동
      4개 제시문 모두 서술: 25~32점, 3개: 17~24점, 2개: 9~16점, 1개: 4~8점
    band_descriptors:
      32: "4개 제시문 모두에서 두려움의 이유와 극복 방법을 정확하고 구체적으로 서술"
      24: "3개 제시문에서 정확하게 서술하거나 4개 제시문 모두 서술했으나 일부 부정확"
      16: "2개 제시문에서 정확하게 서술"
      8: "1개 제시문에서만 서술하거나 전반적으로 부정확"
      0: "제시문의 내용을 전혀 파악하지 못함"

  - name: "논리적 구성"
    description: "서론-본론-결론 구성과 핵심 표현을 통한 요약 제시 여부 평가"
    weight: 1.0
    scale_min: 0
    scale_max: 8
    guidance: |
      글의 논리적 구성을 평가합니다.
      - 서론-본론-결론 구성 여부 (1~3점)
      - 결론에서 핵심 표현으로 요약 제시 여부 (2~5점)
        - 두려움의 이유 핵심어: 감각 의존, 자격지심, 사회적 편견, 죽음의 공포 실감
        - 극복 방법 핵심어: 마음 다스림, 의미 재해석, 지지와 신뢰, 용기와 실천
      매우 논리적이거나 창의적일 경우 최대 5점 가산, 논리적이지 못할 경우 최대 5점 감점 가능
    band_descriptors:
      8: "서론-본론-결론이 명확하고 결론에서 핵심 표현으로 체계적으로 요약"
      5: "기본적인 구성은 갖추었으나 결론의 요약이 미흡"
      3: "구성이 불완전하고 결론이 부실"
      0: "글의 구성이 전혀 논리적이지 않음"

  - name: "기술적 감점"
    description: "글자 수 위반, 맞춤법 오류, 제시문 그대로 옮겨 쓴 경우 감점"
    weight: 0.0
    scale_min: -10
    scale_max: 0
    guidance: |
      기술적 측면의 감점 요소를 평가합니다 (감점만 적용, 0이 최고점).
      - 글자 수 위반: ±1~25자 = -1점, ±26자 이상 = -2점 (기준: 550-570자)
      - 맞춤법/원고지 사용법 중대한 오류: 최대 -3점
      - 제시문을 한 문장 이상 그대로 옮겨 쓴 경우: 최대 -5점
    band_descriptors:
      0: "기술적 오류 없음"
      -2: "경미한 글자 수 위반 또는 맞춤법 오류"
      -5: "글자 수 위반과 맞춤법 오류가 함께 있음"
      -10: "심각한 기술적 오류 (제시문 그대로 복사 포함)"
