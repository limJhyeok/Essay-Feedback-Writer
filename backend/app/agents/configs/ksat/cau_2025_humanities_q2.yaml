name: "KSAT 2025 CAU Humanities Q2"
description: "2025 중앙대학교 인문계 모의논술 문제 2 채점 기준 (40점 만점)"
lang: "ko"
overall_scale_min: 0
overall_scale_max: 40
aggregation: "weighted_average"
rounding: "integer"

system_prompt_template: |
  당신은 대한민국 대학 논술 시험 채점 전문가입니다. 학생의 답안을 채점 기준에 따라 정확하게 평가해야 합니다.

  평가 기준: "{criteria_name}"

  {guidance}

  아래 채점 기준표에 따라 점수를 부여하고, 점수의 근거를 구체적으로 설명하세요. 그리고 답안을 개선할 수 있는 **건설적인 피드백**을 제공하세요.

  **채점 기준표**:
  {band_descriptors}

human_prompt_template: |
  **문제**:
  제시문 (바)에 나타난 고모의 양육 방식을 제시문 (라)와 (마)를 통합적으로 고려하여 비판하고, 제시문 (사)의 성규가 부모와의 갈등에 대처하는 방식과 제시문 (아)에 나타난 화자의 삶의 태도를 토대로 제시문 (바)의 훈이에게 필요한 삶의 자세를 서술하시오. [40점, 550-570자]

  **학생 답안**:
  {student_essay}

aggregator_system_prompt: |
  당신은 대학 논술 시험 채점관입니다.

  채점 결과를 종합하여:
  1. 비판 영역과 삶의 자세 영역의 점수를 합산하고 기술적 감점을 적용하세요.
  2. 총점을 40점 만점 기준으로 산출하세요.
  3. 전체적인 평가를 2-3문장으로 요약하세요.
  4. 개별 기준 피드백을 반복하지 말고 종합적으로 서술하세요.

criteria:
  - name: "고모 양육 방식 비판 ((라)·(마) 통합)"
    description: "(라)와 (마)를 통합적으로 고려하여 고모의 양육 방식을 비판했는지 평가"
    weight: 1.0
    scale_min: 0
    scale_max: 20
    guidance: |
      (라)와 (마)를 통합적으로 활용하여 (바)의 고모의 양육 방식을 비판했는지 평가합니다.
      - (라) 아버지의 지지·격려 ↔ 고모의 일방적 강요 대비 (7점)
      - (마) 아버지의 경청과 주체적 기회 부여 ↔ 고모의 의견 무시 대비 (7점)
      - 통합적 관점으로 비판했는지 (6점)
      상(16~20점): 정확히 이해하고 통합적 관점에서 비판
      중(8~15점): 논지는 파악했으나 통합적 관점 부족
      하(3~8점): 논지 파악 부족, 통합적 비판 없음
    band_descriptors:
      20: "(라)·(마)를 정확히 이해하고 통합적 관점에서 고모의 양육 방식을 체계적으로 비판"
      15: "논지는 파악했으나 각각 서술하거나 통합적 관점 미흡"
      8: "논지는 일부 파악했으나 비판이 불충분"
      3: "제시문의 논지를 제대로 파악하지 못함"
      0: "비판 내용이 전혀 없음"

  - name: "훈이에게 필요한 삶의 자세 ((사)·(아) 활용)"
    description: "(사)와 (아)를 토대로 훈이에게 필요한 삶의 자세를 서술했는지 평가"
    weight: 1.0
    scale_min: 0
    scale_max: 20
    guidance: |
      (사)와 (아)를 토대로 훈이에게 필요한 삶의 자세를 서술했는지 평가합니다.
      - (사) 성규: 갈등 상황에서 자신의 의견을 논리적으로 표현 (5점)
      - (아) 화자: 호기심으로 금기를 어기고 진취적 도전 시도 (5점)
      - 훈이의 자세: 의견을 적극적으로 표명하며 대화 (5점)
      - 훈이의 자세: 수동적 순응 대신 새로운 도전 시도 (5점)
      상(15~20점): (사)·(아) 논지를 정확히 파악하고 훈이의 자세를 잘 서술
      중(8~15점): 논지 파악 또는 훈이 자세 연결 미흡
      하(3~8점): 논지 파악 부족, 훈이 자세 불명확
    band_descriptors:
      20: "(사)·(아)의 논지를 정확히 파악하고 훈이에게 필요한 자세를 구체적으로 서술"
      15: "논지는 파악했으나 훈이의 자세로 연결이 미흡"
      8: "일부 논지만 파악하거나 훈이의 자세가 불명확"
      3: "제시문의 논지를 제대로 파악하지 못함"
      0: "삶의 자세에 대한 서술이 전혀 없음"

  - name: "기술적 감점"
    description: "글자 수 위반, 맞춤법 오류, 제시문 그대로 옮겨 쓴 경우 감점"
    weight: 0.0
    scale_min: -10
    scale_max: 0
    guidance: |
      기술적 측면의 감점 요소를 평가합니다 (감점만 적용, 0이 최고점).
      - 글자 수 위반: ±1~25자 = -1점, ±26자 이상 = -2점 (기준: 550-570자)
      - 맞춤법/원고지 사용법 중대한 오류: 최대 -3점
      - 제시문을 한 문장 이상 그대로 옮겨 쓴 경우: 최대 -5점
    band_descriptors:
      0: "기술적 오류 없음"
      -2: "경미한 글자 수 위반 또는 맞춤법 오류"
      -5: "글자 수 위반과 맞춤법 오류가 함께 있음"
      -10: "심각한 기술적 오류 (제시문 그대로 복사 포함)"
