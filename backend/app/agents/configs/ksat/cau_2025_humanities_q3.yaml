name: "KSAT 2025 CAU Humanities Q3"
description: "2025 중앙대학교 인문계 모의논술 문제 3 채점 기준 (20점 만점)"
lang: "ko"
overall_scale_min: 0
overall_scale_max: 20
aggregation: "weighted_average"
rounding: "integer"

system_prompt_template: |
  당신은 대한민국 대학 논술 시험 채점 전문가입니다. 학생의 답안을 채점 기준에 따라 정확하게 평가해야 합니다.

  평가 기준: "{criteria_name}"

  {guidance}

  아래 채점 기준표에 따라 점수를 부여하고, 점수의 근거를 구체적으로 설명하세요. 그리고 답안을 개선할 수 있는 **건설적인 피드백**을 제공하세요.

  **채점 기준표**:
  {band_descriptors}

human_prompt_template: |
  **문제**:
  제시문 (차)를 토대로 제시문 (자)의 아카키가 경찰서장 대신 고위층 인사를 찾아간 '이유'와 그 행위가 유발할 수 있는 '문제점'을 서술하고, 제시문 (카)를 바탕으로 고위층 인사가 아카키를 대할 때 필요한 자세를 서술하시오. [20점, 330-350자]

  **학생 답안**:
  {student_essay}

aggregator_system_prompt: |
  당신은 대학 논술 시험 채점관입니다.

  채점 결과를 종합하여:
  1. 이유·문제점 영역과 필요한 자세 영역의 점수를 합산하고 기술적 감점을 적용하세요.
  2. 총점을 20점 만점 기준으로 산출하세요.
  3. 전체적인 평가를 2-3문장으로 요약하세요.
  4. 개별 기준 피드백을 반복하지 말고 종합적으로 서술하세요.

criteria:
  - name: "이유와 문제점 서술 ((차)·(자) 활용)"
    description: "아카키가 고위층 인사를 찾아간 이유와 그로 인한 문제점을 정확하게 서술했는지 평가"
    weight: 1.5
    scale_min: 0
    scale_max: 12
    guidance: |
      (차)를 토대로 (자)의 아카키가 고위층 인사를 찾아간 이유와 문제점을 평가합니다.
      - 이유: 관료제의 목적 전치 현상을 우려 (절차에 집착하여 본래 목적을 소홀히 함)
      - 문제점: 사적 감정 개입으로 업무의 공정성 훼손 가능성
      상(9~12점): 이유와 문제점 모두 명확하게 서술
      중(5~7점): 이유와 문제점 모두 서술했으나 내용 불충분
      하(3~5점): 이유 또는 문제점 중 하나만 서술
    band_descriptors:
      12: "이유(목적 전치 현상)와 문제점(공정성 훼손)을 모두 명확하고 구체적으로 서술"
      7: "이유와 문제점 모두 서술했으나 구체성이 부족"
      5: "이유 또는 문제점 중 하나만 적절하게 서술"
      3: "이유와 문제점 모두 부정확하거나 피상적으로 서술"
      0: "이유와 문제점에 대한 서술이 전혀 없음"

  - name: "필요한 자세 서술 ((카) 활용)"
    description: "고위층 인사가 아카키를 대할 때 필요한 자세를 (카)를 바탕으로 서술했는지 평가"
    weight: 1.0
    scale_min: 0
    scale_max: 8
    guidance: |
      (카)를 바탕으로 고위층 인사가 아카키를 대할 때 필요한 자세를 평가합니다.
      - 필요한 자세: 난폭·고압적 태도 대신 지도자로서의 덕(德)과 예(禮)를 갖추어
        아카키를 이해하고 배려하며 감화시키려는 자세
      상(6~8점): (카)에서 필요한 자세를 모두 찾아 서술
      중(3~5점): (카)의 내용을 서술했으나 불충분
    band_descriptors:
      8: "(카)의 덕치 사상을 정확히 이해하고 고위층 인사에게 필요한 자세를 구체적으로 서술"
      5: "(카)의 내용을 일부 반영했으나 덕과 예의 구체적 적용이 미흡"
      3: "(카)와의 연결이 불명확하고 자세가 피상적"
      0: "필요한 자세에 대한 서술이 전혀 없음"

  - name: "기술적 감점"
    description: "글자 수 위반, 맞춤법 오류, 제시문 그대로 옮겨 쓴 경우 감점"
    weight: 0.0
    scale_min: -10
    scale_max: 0
    guidance: |
      기술적 측면의 감점 요소를 평가합니다 (감점만 적용, 0이 최고점).
      - 글자 수 위반: ±1~25자 = -1점, ±26자 이상 = -2점 (기준: 330-350자)
      - 맞춤법/원고지 사용법 중대한 오류: 최대 -3점
      - 제시문을 한 문장 이상 그대로 옮겨 쓴 경우: 최대 -5점
    band_descriptors:
      0: "기술적 오류 없음"
      -2: "경미한 글자 수 위반 또는 맞춤법 오류"
      -5: "글자 수 위반과 맞춤법 오류가 함께 있음"
      -10: "심각한 기술적 오류 (제시문 그대로 복사 포함)"
