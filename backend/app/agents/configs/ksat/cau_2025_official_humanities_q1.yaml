name: "KSAT 2025 CAU Official Humanities Q1"
description: "2025 중앙대학교 인문사회계열 본고사 논술 문제 1 채점 기준 (40점 만점)"
lang: "ko"
overall_scale_min: 0
overall_scale_max: 40
aggregation: "weighted_sum"
rounding: "integer"

system_prompt_template: |
  당신은 대한민국 대학 논술 시험 채점 전문가입니다. 학생의 답안을 채점 기준에 따라 정확하게 평가해야 합니다.

  이 문항은 제시문 (가)~(라)에서 등장인물이 부탁을 수락한 '이유'와 수락한 인물에게 발생한 '결과'를 각각 찾아 서론-본론-결론을 갖춘 하나의 완성된 글로 논술하는 과제입니다.

  평가 기준: "{criteria_name}"

  {guidance}

  아래 채점 기준표에 따라 점수를 부여하고, 점수의 근거를 구체적으로 설명하세요. 그리고 답안을 개선할 수 있는 **건설적인 피드백**을 한국어로 제공하세요.

  **채점 기준표**:
  {band_descriptors}

human_prompt_template: |
  **문제**:
  제시문 (가)~(라)에는 부탁하는 상황이 나타난다. 제시문 (가), (나), (다), (라)에서 등장인물이 부탁을 수락한 '이유'와 수락한 인물에게 발생한 '결과'를 각각 찾아 하나의 완성된 글로 논술하시오. [40점, 550-570자]

  **학생 답안**:
  {student_essay}

aggregator_system_prompt: |
  당신은 대학 논술 시험 채점관입니다.

  채점 결과를 종합하여:
  1. 내용 점수와 논리적 구성 점수를 합산하고 기술적 감점을 적용하세요.
  2. 총점을 40점 만점 기준으로 산출하세요.
  3. 전체적인 평가를 2-3문장으로 요약하세요.
  4. 개별 기준 피드백을 반복하지 말고 종합적으로 서술하세요.

criteria:
  - name: "내용 이해 (제시문별 이유·결과)"
    description: "제시문 (가)~(라)에서 등장인물이 부탁을 수락한 '이유'와 수락한 인물에게 발생한 '결과'를 각각 정확히 서술했는지 평가 (32점)"
    weight: 1.0
    scale_min: 0
    scale_max: 32
    guidance: |
      각 제시문에서 '이유'(4점)와 '결과'(4점)를 정확히 서술했는지 평가합니다 (제시문당 8점, 4개 제시문 총 32점).

      - **(가) 윤흥길, 「완장」**
        - 이유: 완장을 찬 사람들에게 당한 고통의 기억과 완장이 상징하는 권력에 대한 선망
        - 결과: 어머니가 기뻐할 것이라는 기대와 달리 아버지에 대한 기억으로 인한 우려 때문에 어머니와의 의견 대립
      - **(나) 이강백, 「파수꾼」**
        - 이유: 자신의 확신을 증명하고 싶은 마음과 촌장의 약속에 대한 믿음
        - 결과: 촌장에게 배신당해 격리되고 진실을 말할 기회를 잃게 됨
      - **(다) 윤흥길, 「아홉 켤레의 구두로 남은 사내」**
        - 이유: 절박한 상황에 처한 권씨에 대한 연민과 전세금도 빚이라는 부채감
        - 결과: 보호자가 된 듯한 보람과 생명 탄생의 감동을 느낌
      - **(라) 「전시회 공간을 빌려라」**
        - 이유: 학생들의 행사가 공공성이라는 운영 원칙에 부합하고, 일정이 협의됨
        - 결과: 구청이 주민 행사를 돕는다고 홍보할 기회를 얻게 됨

      **배점 가이드** (4개 제시문 × (이유 4점 + 결과 4점) = 32점):
      - 4개 제시문 모두 이유·결과를 제시: 25~32점
      - 3개 제시문에서 제시: 17~24점
      - 2개 제시문에서 제시: 9~16점
      - 1개 제시문에서만 제시: 4~8점
    band_descriptors:
      32: "4개 제시문 모두에서 이유와 결과를 정확하고 구체적으로 서술"
      25: "4개 제시문을 다루었으나 일부 제시문에서 구체성이 부족"
      20: "3개 제시문에서 정확히 서술"
      12: "2개 제시문에서 정확히 서술"
      6: "1개 제시문에서만 서술하거나 전반적으로 피상적"
      0: "제시문의 이유·결과를 전혀 파악하지 못함"

  - name: "논리적 구성"
    description: "서론-본론-결론 구성과 결론에서의 핵심 요약 제시 여부 평가 (8점)"
    weight: 1.0
    scale_min: 0
    scale_max: 8
    guidance: |
      네 제시문의 이유·결과를 하나의 완성된 글(서론/본론/결론)로 논리적으로 구성했는지 평가합니다.
      - 서론-본론-결론의 논리적 구성 여부 (1~3점)
      - 결론에서 각 제시문의 이유·결과가 핵심적 표현으로 요약 제시되었는지 (2~5점)

      **예시**
      - 서론: "제시문 (가)~(라)에는 부탁을 수락하는 다양한 모습이 나타난다."
      - 결론: "이처럼 등장인물들은 권력, 믿음, 연민과 부채감, 공공성 등을 이유로 부탁을 수락하고, 의견 대립, 기회 상실, 보람과 감동, 기회 획득 등의 결과를 얻는다."

      ※ 글이 매우 논리적이거나 창의적일 경우 최대 5점 가산, 논리적이지 못할 경우 최대 5점 감점 가능.
    band_descriptors:
      8: "서론-본론-결론이 명확하고 결론에서 핵심 표현으로 체계적으로 요약"
      5: "기본적인 구성은 갖추었으나 결론의 요약이 부분적"
      3: "구성이 불완전하고 결론이 부실"
      1: "도입·결말 중 하나만 존재"
      0: "글의 구성이 전혀 논리적이지 않음"

  - name: "기술적 감점"
    description: "글자 수 위반, 맞춤법 오류, 제시문 그대로 옮겨 쓴 경우 감점 (최대 -5점, 0이 최고점)"
    weight: 1.0
    scale_min: -10
    scale_max: 0
    guidance: |
      기술적 측면의 감점 요소를 평가합니다 (감점만 적용, 0이 최고점).
      - 글자 수 위반 (기준 550-570자): ±1~25자 = -1점, ±26자 이상 = -2점
      - 맞춤법/원고지 사용법 중대한 오류: 최대 -3점
      - 제시문을 한 문장 이상 그대로 옮겨 쓴 경우: 최대 -5점
    band_descriptors:
      0: "기술적 오류 없음"
      -2: "경미한 글자 수 위반 또는 맞춤법 오류"
      -5: "글자 수 위반·맞춤법 오류·제시문 복사 중 두 가지가 함께"
      -10: "심각한 기술적 오류 (제시문 그대로 복사 포함)"
