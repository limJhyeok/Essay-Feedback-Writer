name: "KSAT 2025 CAU Official Humanities Q2"
description: "2025 중앙대학교 인문사회계열 본고사 논술 문제 2 채점 기준 (40점 만점)"
lang: "ko"
overall_scale_min: 0
overall_scale_max: 40
aggregation: "weighted_sum"
rounding: "integer"

system_prompt_template: |
  당신은 대한민국 대학 논술 시험 채점 전문가입니다. 학생의 답안을 채점 기준에 따라 정확하게 평가해야 합니다.

  이 문항은 (1) 제시문 (라)를 토대로 (마)의 '관리소장'의 태도를 비판하고, (2) 제시문 (바)와 (사)를 통합적으로 고려하여 (마)의 '공'이 느끼는 부당함을 해소하기 위한 '관리소장'의 역할을 서술하는 2단 구성 과제입니다.

  평가 기준: "{criteria_name}"

  {guidance}

  아래 채점 기준표에 따라 점수를 부여하고, 점수의 근거를 구체적으로 설명하세요. 그리고 답안을 개선할 수 있는 **건설적인 피드백**을 한국어로 제공하세요.

  **채점 기준표**:
  {band_descriptors}

human_prompt_template: |
  **문제**:
  제시문 (라)를 토대로 제시문 (마)의 '관리소장'의 태도를 비판하고, 제시문 (마)의 '공'이 느끼는 부당함을 해소하기 위한 '관리소장'의 역할을 제시문 (바)와 (사)를 통합적으로 고려하여 서술하시오. [40점, 550-570자]

  **학생 답안**:
  {student_essay}

aggregator_system_prompt: |
  당신은 대학 논술 시험 채점관입니다.

  채점 결과를 종합하여:
  1. 관리소장 태도 비판 점수와 관리소장 역할 서술 점수를 합산하고 기술적 감점을 적용하세요.
  2. 총점을 40점 만점 기준으로 산출하세요.
  3. 전체적인 평가를 2-3문장으로 요약하세요.
  4. 개별 기준 피드백을 반복하지 말고 종합적으로 서술하세요.

criteria:
  - name: "(라) 토대 (마) 관리소장 태도 비판"
    description: "제시문 (라)를 토대로 (마)에 나타난 '관리소장'의 태도를 비판했는지 평가 (15점)"
    weight: 1.0
    scale_min: 0
    scale_max: 15
    guidance: |
      제시문 (라)의 협상 사례를 토대로, (마)의 관리소장이 '공'의 항의에 보인 태도를 비판적으로 분석했는지 평가합니다.

      - ① (라)의 태도 파악 (5점):
        상우와 공무원이 서로 경청하고 양보하는 협력적인 태도를 보이고, 융통성 있게 의견을 조정한다는 점 서술
      - ② (마) 관리소장 비판 (5~10점):
        이를 토대로 (마)의 관리소장이 '공'의 항의에 무책임한 태도와 비협조적인 태도를 보인다는 점 서술

      배점 가이드:
      - 상(12~15점): (라)의 태도를 정확히 파악하고 (마) 관리소장을 구체적·비판적으로 분석
      - 중(7~11점): 한쪽 서술이 간소하거나 (라)↔(마) 연결이 다소 약함
      - 하(3~6점): (라) 태도 파악 또는 (마) 비판이 피상적
    band_descriptors:
      15: "(라)의 협력·조정 태도를 정확히 파악하고, (마) 관리소장의 무책임·비협조 태도를 구체적으로 비판"
      11: "(라)·(마)를 모두 다루었으나 한쪽이 다소 간소"
      7: "한쪽만 명확, 다른 쪽은 피상적"
      3: "비판 서술이 불분명하거나 단순 요약"
      0: "(라) 토대의 비판이 전혀 없음"

  - name: "(바)·(사) 통합 관리소장 역할 서술"
    description: "(바)와 (사)를 통합적으로 고려하여 '관리소장'의 역할을 서술했는지 평가 (25점)"
    weight: 1.0
    scale_min: 0
    scale_max: 25
    guidance: |
      제시문 (바)와 (사)를 통합적으로 고려하여, '공'이 느끼는 부당함을 해소하기 위한 관리소장의 역할을 서술했는지 평가합니다.

      - ① 통합 관점 (5점):
        (바)와 (사)를 통합하여 관리소장이 **신뢰에 기반한 중재자** 역할을 해야 함을 서술
      - ② (바) 적용 (10점):
        관리소장이 승강기 교체에 대한 이해를 구하고 교체 비용에 대한 **정보를 공개**하여 '공'과의 신뢰를 형성해야 한다는 점 서술
      - ③ (사) 적용 (10점):
        관리소장이 **협의의 자리를 마련**하여 서로의 입장을 이해하고 공동 분담에 협조하도록 중재해야 하며, 보상과 추후 논의를 통해 자발적 참여를 독려하는 역할 서술

      배점 가이드:
      - 상(20~25점): (바)·(사) 논지를 통합적으로 파악하고 관리소장 역할을 구체적으로 도출
      - 중(10~19점): (바) 또는 (사) 한쪽만 적용이 명확하고 다른 쪽이 부실
      - 하(3~9점): 논지 파악 또는 역할 도출이 피상적

      ※ 글이 매우 논리적이거나 창의적일 경우 최대 5점 가산, 논리적이지 못할 경우 최대 5점 감점 가능.
    band_descriptors:
      25: "(바)·(사)를 통합해 신뢰 기반 중재자 역할을 도출하고, 정보 공개·협의 자리 마련을 구체적으로 서술"
      20: "(바)·(사)를 모두 활용했으나 한쪽 적용이 다소 간소"
      14: "(바) 또는 (사) 한쪽만 명확, 다른 쪽은 피상적"
      7: "역할 서술이 일반적·피상적"
      0: "(바)·(사) 기반 역할 서술이 전혀 없음"

  - name: "기술적 감점"
    description: "글자 수 위반, 맞춤법 오류, 제시문 그대로 옮겨 쓴 경우 감점 (최대 -5점, 0이 최고점)"
    weight: 1.0
    scale_min: -10
    scale_max: 0
    guidance: |
      기술적 측면의 감점 요소를 평가합니다 (감점만 적용, 0이 최고점).
      - 글자 수 위반 (기준 550-570자): ±1~25자 = -1점, ±26자 이상 = -2점
      - 맞춤법/원고지 사용법 중대한 오류: 최대 -3점
      - 제시문을 한 문장 이상 그대로 옮겨 쓴 경우: 최대 -5점
    band_descriptors:
      0: "기술적 오류 없음"
      -2: "경미한 글자 수 위반 또는 맞춤법 오류"
      -5: "글자 수 위반·맞춤법 오류·제시문 복사 중 두 가지가 함께"
      -10: "심각한 기술적 오류 (제시문 그대로 복사 포함)"
