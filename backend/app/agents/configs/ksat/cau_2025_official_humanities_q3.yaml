name: "KSAT 2025 CAU Official Humanities Q3"
description: "2025 중앙대학교 인문사회계열 본고사 논술 문제 3 채점 기준 (20점 만점)"
lang: "ko"
overall_scale_min: 0
overall_scale_max: 20
aggregation: "weighted_sum"
rounding: "integer"

system_prompt_template: |
  당신은 대한민국 대학 논술 시험 채점 전문가입니다. 학생의 답안을 채점 기준에 따라 정확하게 평가해야 합니다.

  이 문항은 (1) 제시문 (아)의 '빅이슈코리아'와 (자)의 '슈팅 백 프로젝트'의 목적의 공통점과 지원방식의 차이점을 서술하고, (2) (자)의 아이들이 사진 찍는 방법을 배울 때 지녀야 할 태도를 제시문 (차)를 활용하여 서술하는 과제입니다.

  평가 기준: "{criteria_name}"

  {guidance}

  아래 채점 기준표에 따라 점수를 부여하고, 점수의 근거를 구체적으로 설명하세요. 그리고 답안을 개선할 수 있는 **건설적인 피드백**을 한국어로 제공하세요.

  **채점 기준표**:
  {band_descriptors}

human_prompt_template: |
  **문제**:
  제시문 (아)의 '빅이슈코리아'와 (자)의 '슈팅 백 프로젝트'의 목적의 공통점과 지원방식의 차이점을 서술하고, 제시문 (자)의 아이들이 사진 찍는 방법을 배울 때 지녀야 할 태도를 제시문 (차)를 활용하여 서술하시오. [20점, 330-350자]

  **학생 답안**:
  {student_essay}

aggregator_system_prompt: |
  당신은 대학 논술 시험 채점관입니다.

  채점 결과를 종합하여:
  1. 공통점·차이점 서술 점수와 사진 찍을 때 지녀야 할 태도 점수를 합산하고 기술적 감점을 적용하세요.
  2. 총점을 20점 만점 기준으로 산출하세요.
  3. 전체적인 평가를 2-3문장으로 요약하세요.
  4. 개별 기준 피드백을 반복하지 말고 종합적으로 서술하세요.

criteria:
  - name: "(아)·(자) 목적 공통점·지원방식 차이점"
    description: "빅이슈코리아와 슈팅 백 프로젝트의 목적의 공통점과 지원방식의 차이점을 명확하게 설명했는지 평가 (14점)"
    weight: 1.0
    scale_min: 0
    scale_max: 14
    guidance: |
      제시문 (아)와 (자)의 논지를 명확하게 이해하여, 두 사업의 목적의 공통점과 지원방식의 차이점을 서술했는지 평가합니다.

      - ① 목적의 공통점 (7점):
        두 사업 모두 **취약계층이 스스로 어려움을 극복하는 능력**을 갖추도록 동기를 부여한다는 점
      - ② 지원방식의 차이점 (7점):
        - (아) 빅이슈코리아: 경제 활동을 **실천하는 정도에 상응하는 단계적(주거) 지원**
        - (자) 슈팅 백 프로젝트: **교육을 통한 성취 경험**과 자기 발견의 계기 제공

      배점 가이드:
      - 상(11~14점): 스스로 극복 능력이라는 공통점과 단계적 지원 vs 교육적 성취라는 차이점을 모두 구체적으로 제시
      - 중(4~10점): 공통점·차이점 중 한쪽이 일반적이거나 (경제 지원 vs 교육 수준)
      - 하(1~3점): 단순히 "취약계층을 돕는다" 수준의 공통점과 단순 대조
    band_descriptors:
      14: "'스스로 극복 능력' 공통점과 '실천에 상응하는 단계적 지원 vs 교육 성취'라는 차이점을 모두 명료하게 서술"
      11: "공통점·차이점을 모두 다루었으나 한쪽 구체성이 다소 부족"
      7: "취약계층 지원 공통점과 경제/교육 차원의 대조 수준"
      4: "공통점·차이점 중 한쪽만 서술하거나 단순 요약"
      0: "공통점·차이점을 전혀 파악하지 못함"

  - name: "(차) 활용 사진 찍을 때 태도"
    description: "아이들이 사진 찍는 방법을 배울 때 지녀야 할 태도를 제시문 (차)를 활용하여 서술했는지 평가 (6점)"
    weight: 1.0
    scale_min: 0
    scale_max: 6
    guidance: |
      제시문 (차)의 볶음밥 교훈을 활용하여, (자)의 아이들이 사진 찍는 방법을 배울 때 지녀야 할 두 가지 태도를 도출했는지 평가합니다.

      - ① **모험적·진취적 태도** (2점):
        사진을 창의적으로 찍을 때 예상보다 좋은 결과를 얻을 수 있다는 태도
      - ② **긍정적 태도** (2점):
        찍은 사진이 원하지 않았던 결과이더라도 이를 **배움과 발전의 기회**로 삼으면 된다는 태도

      배점 가이드:
      - 상(4~6점): 두 태도를 모두 명료하게 서술
      - 중(1~3점): 한 태도만 서술하거나 두 태도를 한 문장으로 피상적으로 요약

      ※ 글이 매우 논리적이거나 창의적일 경우 최대 3점 가산, 논리적이지 못할 경우 최대 3점 감점 가능.
    band_descriptors:
      6: "모험적·진취적 태도와 긍정적 태도 두 가지를 모두 명료하게 서술"
      4: "두 태도를 모두 다루었으나 한쪽이 간소"
      2: "한 태도만 명확하게 서술"
      1: "태도 서술이 피상적"
      0: "(차)를 활용한 태도 서술이 전혀 없음"

  - name: "기술적 감점"
    description: "글자 수 위반, 맞춤법 오류, 제시문 그대로 옮겨 쓴 경우 감점 (최대 -5점, 0이 최고점)"
    weight: 1.0
    scale_min: -10
    scale_max: 0
    guidance: |
      기술적 측면의 감점 요소를 평가합니다 (감점만 적용, 0이 최고점).
      - 글자 수 위반 (기준 330-350자): ±1~25자 = -1점, ±26자 이상 = -2점
      - 맞춤법/원고지 사용법 중대한 오류: 최대 -3점
      - 제시문을 한 문장 이상 그대로 옮겨 쓴 경우: 최대 -5점
    band_descriptors:
      0: "기술적 오류 없음"
      -2: "경미한 글자 수 위반 또는 맞춤법 오류"
      -5: "글자 수 위반·맞춤법 오류·제시문 복사 중 두 가지가 함께"
      -10: "심각한 기술적 오류 (제시문 그대로 복사 포함)"
