name: "KSAT 2026 Inha Humanities Q1"
description: "2026 인하대학교 인문계 모의논술 문항 1 채점 기준 (60점 만점)"
lang: "ko"
overall_scale_min: 0
overall_scale_max: 60
aggregation: "weighted_sum"
rounding: "integer"

system_prompt_template: |
  당신은 대한민국 대학 논술 시험 채점 전문가입니다. 학생의 답안을 채점 기준에 따라 정확하게 평가해야 합니다.

  이 문항은 "가계부채에 대해 국가 개입이 불필요하다"는 주장에 대해 (1) 제시문 (가)~(마)를 활용해 정당화하고, (2) 반론을 제시한 뒤, (3) 제시문 밖의 2가지 논거로 재반박을 전개하는 3단 논술입니다.

  평가 기준: "{criteria_name}"

  {guidance}

  아래 채점 기준표에 따라 점수를 부여하고, 점수의 근거를 구체적으로 설명하세요. 그리고 답안을 개선할 수 있는 **건설적인 피드백**을 한국어로 제공하세요.

  **채점 기준표**:
  {band_descriptors}

human_prompt_template: |
  **문제**:
  '가계부채에 대해 국가 개입이 불필요하다'는 주장에 대해 제시문 (가)~(마)를 모두 활용하여 정당화하고, 반론을 제시하시오. 그리고 이 반론에 대해 제시문 밖에서 2가지 논거를 찾아 재반론하시오. (1,000자±100자, 60점)

  **학생 답안**:
  {student_essay}

aggregator_system_prompt: |
  당신은 대학 논술 시험 채점관입니다.

  채점 결과를 종합하여:
  1. 각 평가 항목의 점수를 합산해 60점 만점 기준으로 산출하세요.
  2. 전체적인 평가를 2-3문장으로 요약하세요.
  3. 개별 기준 피드백을 반복하지 말고 종합적으로 서술하세요.

criteria:
  - name: "입장 정당화"
    description: "(나)와 (다)의 논거를 활용해 '국가 개입 불필요' 입장을 정당화했는지 평가 (10점)"
    weight: 1.0
    scale_min: 0
    scale_max: 10
    guidance: |
      '국가 개입 불필요' 입장을 뒷받침하는 두 개의 핵심 논거를 정확히 활용했는지 평가합니다.
      각 논거당 최대 5점씩 총 10점.

      - **(나)의 논거 (5점)**: 소유의 권리를 누리기 위해서는 사회적으로 정당한 자기 절제와 책임 있는 태도가 필수적인 자격 요건이다. 가계부채는 개인의 자유로운 윤리적 판단과 도덕적 책임에 따라 이루어진 것이므로, 그 책임 역시 개인에게 있다.
      - **(다)의 논거 (5점)**: 계약 당사자가 충분한 정보를 바탕으로 자율적으로 계약에 참여했다면, 계약 내용에 따라야 한다. 이러한 조건이 충족된 계약으로 인해 채무가 발생한 경우, 당사자는 그에 대한 책임을 져야 한다.

      제시문 내용을 정확하게 요약해 논거로 활용한 경우 만점, 부분적·피상적 활용은 부분 점수, 무관한 활용은 0점.
    band_descriptors:
      10: "(나)와 (다)의 핵심 논거를 모두 정확히 제시하며 '국가 개입 불필요' 입장을 명확히 정당화"
      7: "두 논거를 모두 활용했으나 한쪽이 부정확하거나 피상적"
      5: "한 논거만 정확히 활용 (나머지는 누락 또는 잘못된 활용)"
      3: "한 논거를 부분적으로만 활용"
      0: "두 논거 모두 활용하지 못했거나 논거가 입장 정당화와 무관함"

  - name: "예상 반박"
    description: "(가), (라), (마)의 논거를 활용해 '국가 개입 필요' 입장의 반박을 제시했는지 평가 (15점)"
    weight: 1.0
    scale_min: 0
    scale_max: 15
    guidance: |
      '국가 개입 필요' 입장의 반박 논거 세 개를 각 제시문에서 정확히 추출했는지 평가합니다.
      각 논거당 최대 5점씩 총 15점.

      - **(가)의 논거 (5점)**: 사회구조의 문제나 국가의 부적절한 경제 정책이 가계부채 폭증의 원인이 될 수 있다.
      - **(라)의 논거 (5점)**: 국가는 생존권, 자유권, 인간다운 삶을 보장하는 존엄권의 보호와 실현을 존립 목표로 삼아야 한다. 만약 부채로 인해 개인의 존엄권이 침해될 위기에 처한다면, 국가는 이를 보호하기 위해 부채 변제에 개입해야 한다.
      - **(마)의 논거 (5점)**: 과도한 부채는 단순히 개인의 무절제가 아니라, 치열한 경쟁과 과도한 성과를 요구하는 사회구조적 결합에서 비롯된 결과일 수 있다. 공공자원의 배분을 개인 간 경쟁 체제에 맡기기보다 필요에 따라 공동체 구성원의 연대에 기반해 배분될 때 사회 전체의 행복이 더 증진되므로 국가의 개입이 필요하다.
    band_descriptors:
      15: "(가), (라), (마) 세 논거를 모두 정확하고 구체적으로 서술"
      12: "세 논거 중 두 개는 정확, 한 개는 부분적"
      10: "두 논거를 정확히 서술"
      7: "한 논거만 정확히 서술"
      4: "반박을 시도했으나 논거가 부정확하거나 피상적"
      0: "반박 없음 또는 제시문 논거와 무관"

  - name: "재반박"
    description: "제시문 밖의 2가지 논거로 반박을 재반박했는지 평가 (20점)"
    weight: 1.0
    scale_min: 0
    scale_max: 20
    guidance: |
      학생은 반박(국가 개입 필요)에 대해 제시문 (가)/(나)/(다)의 논거를 반복하지 않고 제시문 밖에서 2가지 논거를 찾아 재반박해야 합니다.

      **유효한 재반박 논거 예시** (학생이 이 외의 합당한 논거를 제시해도 무방):
      - 정부가 가계부채 문제에 개입하면, 채무자가 미래에도 무책임한 금융 행동을 반복할 유인을 제공하여 도덕적 해이를 유발할 수 있다.
      - 국가의 반복적 개입은 재정 지출을 확대시켜 재정 적자와 국가부채를 증가시키고, 장기적으로 재정 건전성을 훼손할 수 있다.
      - 정부의 부채 구제 조치는 성실히 채무를 상환한 가계와 구제 대상 간의 불공정성을 초래할 수 있으며, 이는 사회적 형평성의 원칙을 침해한다.
      - 정부의 정책 결정은 정보의 비대칭, 정치적 이해관계, 관료제 비효율 등으로 인해 항상 합리적으로 작동하지 않으며, 시장보다 더 큰 실패를 초래할 수 있다.
      - 정부 개입은 가격 메커니즘이나 자원 배분을 왜곡시켜 시장 효율성을 저해하고, 경쟁 질서를 훼손할 수 있다.

      **배점 가이드**:
      - 유효한 제시문 밖 논거 2개 제시 + 각 논거로 반박을 구체적으로 재반박: 17~20점
      - 논거 2개이지만 한쪽이 피상적 또는 반박과의 연결이 약함: 12~16점
      - 유효한 논거 1개만 제시: 6~11점
      - 논거를 시도했으나 사실상 제시문 (가)/(나)/(다)의 재활용 또는 앞선 자기 주장 재기술: 10점 이하

      ※ **재반론에서 자신의 앞선 '입장 정당화' 주장을 재기술한 경우 10점 이하 부여** (해설지 명시).
    band_descriptors:
      20: "제시문 밖의 독립적 논거 2개로 반박을 설득력 있게 재반박"
      15: "논거 2개이나 한쪽이 부족하거나 반박과 연결이 약함"
      10: "논거 1개만 제시했거나 앞선 입장 정당화를 재기술"
      5: "제시문 (가)/(나)/(다)의 논거를 반복하여 사용"
      0: "재반박 없음 또는 완전히 논지 이탈"

  - name: "글의 논리성"
    description: "글 전체의 일관성, 논리적 연결, 설득력 평가 (15점, 채점자 재량)"
    weight: 1.0
    scale_min: 0
    scale_max: 15
    guidance: |
      글 전체가 일관성을 유지하고, 논리적으로 잘 연결되며, 설득력이 있는지 평가합니다. (채점자 재량에 따라 15점 이내에서 부과)

      평가 요소:
      - 3단 구성(정당화 → 반박 → 재반박)의 흐름이 자연스러운가
      - 각 단의 논거 간 논리적 연결이 명확한가
      - 동어반복, 논리 비약, 모순된 주장이 없는가
      - 문장·단락 간 전환이 매끄러운가
      - 주장과 근거의 비율이 적절한가

      ※ 감점 요소(불필요한 서론/결론, 제시문 원문 그대로 옮겨 적음, 원고지·맞춤법 오류, 분량 미달/초과)는 별도 기술적 감점 기준에 따라 처리되므로 여기서는 중복 감점하지 말 것.
    band_descriptors:
      15: "구성·논리·설득력이 모두 뛰어나며 흐름이 매끄러움"
      12: "전반적으로 논리적이나 일부 연결이 약함"
      9: "기본 구성은 갖추었으나 논리 비약 또는 근거 부족 존재"
      5: "구성이 불완전하고 흐름이 자주 끊김"
      0: "논리성이 전혀 확보되지 않음"

  - name: "기술적 감점"
    description: "형식 오류 및 분량 위반에 대한 감점 (최대 -25점, 0이 최고점)"
    weight: 1.0
    scale_min: -25
    scale_max: 0
    guidance: |
      감점만 적용됩니다. 0이 최고점(무감점).

      **형식 요소 (각 항목 -5점 이내, 총 -15점 이내)**:
      - 불필요한 서론 혹은 결론 부연 (최대 -5점)
      - 제시문에 나와 있는 문장을 원래의 완전한 문장 형태를 유지한 채 그대로 옮겨 적음 (최대 -5점)
      - 원고지 작성법, 맞춤법, 띄어쓰기 등의 오류, 부적절하거나 부정확한 어휘·문장이 전반적으로 심각함 (최대 -5점)

      **분량 기준 (공백 포함 기준, 최대 -10점)**:
      - 500자 미만 (결시 아닌 백지 포함): 답안 내용과 관계없이 0점 부여 (이 경우 학생 답안이 0점이 되어야 하므로 전체 피드백에서 명시)
      - 500자 – 699자: -10점
      - 700자 – 899자: -5점
      - 900자 – 1,100자: 감점 없음
      - 1,100자 초과: -5점
    band_descriptors:
      0: "형식 오류 없음, 분량 900~1,100자 충족"
      -5: "경미한 형식 오류 한 가지 또는 분량 경계 이탈"
      -10: "형식 오류 둘 이상 또는 분량 미달/초과"
      -15: "형식 오류와 분량 위반이 동시에 발생"
      -25: "심각한 형식·분량 위반으로 답안의 평가 자체가 제한됨"
