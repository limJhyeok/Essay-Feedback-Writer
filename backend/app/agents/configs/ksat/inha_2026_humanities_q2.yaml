name: "KSAT 2026 Inha Humanities Q2"
description: "2026 인하대학교 인문계 모의논술 문항 2 채점 기준 (40점 만점)"
lang: "ko"
overall_scale_min: 0
overall_scale_max: 40
aggregation: "weighted_sum"
rounding: "integer"

system_prompt_template: |
  당신은 대한민국 대학 논술 시험 채점 전문가입니다. 학생의 답안을 채점 기준에 따라 정확하게 평가해야 합니다.

  이 문항은 〈다음〉의 주장("가계부채 문제를 시장의 자율 조정에만 맡길 수 없으며, 국가의 개입과 제도적 통제가 필요하다")에 대해 (자료 1)~(자료 6)을 활용하여 정당성을 논리적으로 서술하고, 선택하지 않은 나머지 자료를 활용해 반론을 제시하는 논술입니다. 자료는 텍스트·표·그래프(마크다운 표와 이미지)로 혼합 구성되어 있습니다.

  평가 기준: "{criteria_name}"

  {guidance}

  아래 채점 기준표에 따라 점수를 부여하고, 점수의 근거를 구체적으로 설명하세요. 그리고 답안을 개선할 수 있는 **건설적인 피드백**을 한국어로 제공하세요.

  **채점 기준표**:
  {band_descriptors}

human_prompt_template: |
  **문제**:
  〈다음〉의 주장에 대해 (자료 1)~(자료 6)을 활용하여 그 정당성을 논리적으로 서술하고, 선택하지 않은 나머지 자료를 활용하여 반론을 제시하시오. (600자±60자, 40점)

  **학생 답안**:
  {student_essay}

aggregator_system_prompt: |
  당신은 대학 논술 시험 채점관입니다.

  채점 결과를 종합하여:
  1. 각 평가 항목의 점수를 합산해 40점 만점 기준으로 산출하세요.
  2. 전체적인 평가를 2-3문장으로 요약하세요.
  3. 개별 기준 피드백을 반복하지 말고 종합적으로 서술하세요.

criteria:
  - name: "입장 정당화"
    description: "(자료 1), (자료 3), (자료 4)를 활용해 '국가 개입 필요' 입장을 정당화했는지 평가 (15점)"
    weight: 1.0
    scale_min: 0
    scale_max: 15
    guidance: |
      〈다음〉의 주장을 뒷받침하는 자료 3개를 정확히 분석·해석해 활용했는지 평가합니다.
      각 자료당 최대 5점씩 총 15점.

      - **(자료 1) 분석과 해석 (5점)**: 기준금리 인상 이후 신용갭의 증가세가 완화되고 있다. 그럼에도 불구하고 신용갭이 여전히 +10%를 초과하는 상황이므로 시장 자율이 아닌 국가의 제도적 개입이 필요하다.
      - **(자료 3) 분석과 해석 (5점)**: 주택담보대출 상환지원 재융자 프로그램은 수혜 가계의 실질적 재정 안정에 기여했을 뿐 아니라, 정치 참여와 사회 참여 수준도 높이는 긍정적 효과를 보였다. 특히 소득이 낮을수록 정부 개입의 효과가 더 크게 나타났으며, 이는 정부의 재정 개입이 사회적 자본과 시민성 회복으로 이어질 수 있음을 보여준다.
      - **(자료 4) 분석과 해석 (5점)**: 정부의 금융 정책 중 저소득층 대상 이전지출 정책은 기업 대상 세제지원보다 재정 승수가 크고, 경제 성장에 더 효과적인 것으로 나타났다. 특히 경제위기 상황에서는 저소득층 가계에 대한 직접 개입의 경기 회복 효과가 평상시보다 더욱 크므로, 위기 시 가계부채에 대한 정부 개입은 필요하며 효과적이다.

      숫자·지표를 정확히 인용하며 분석하면 만점, 자료 언급만 있고 해석이 부실하면 부분 점수, 자료를 잘못 해석하거나 반박 자료를 정당화에 사용하면 해당 자료는 0점 처리.
    band_descriptors:
      15: "세 자료 모두 정확한 해석과 함께 정당화에 활용"
      12: "세 자료 활용, 그 중 한두 자료의 해석이 피상적이거나 수치 인용이 부정확"
      10: "두 자료만 정확히 활용"
      7: "한 자료만 정확히 활용"
      4: "자료를 언급했으나 해석·활용이 전반적으로 부정확"
      0: "세 자료를 정당화에 활용하지 못함"

  - name: "예상 반박"
    description: "(자료 2), (자료 5), (자료 6)을 활용해 '국가 개입' 주장의 반박을 제시했는지 평가 (15점)"
    weight: 1.0
    scale_min: 0
    scale_max: 15
    guidance: |
      정당화에 선택하지 않은 나머지 자료 3개를 활용해 반박을 구성했는지 평가합니다.
      각 자료당 최대 5점씩 총 15점.

      - **(자료 2) 분석과 해석 (5점)**: 〈그림 2〉는 보증기관의 매출은 유지되고 있으나 당기순이익은 지속적으로 악화됨을 보여준다. 그 이유는 〈그림 3〉의 보증금 대위변제의 급증에 따른 것으로 공공 개입의 필요성에 대한 논란이 증가하고 있다.
      - **(자료 5) 분석과 해석 (5점)**: 〈표 2〉에 따르면, 사회경제적 배경과 PISA 점수 간의 상관관계가 클수록 교육 불평등이 높은 경향을 보인다. 〈그림 5〉는 교육 불평등이 큰 국가(A, B국)가 오히려 그렇지 않은 국가(C, D국)보다 높은 평균 성취도를 보이고 있으며, 교육 평등을 지향한 D국은 수학 점수가 급격히 하락했음을 보여준다. 이는 정부가 불평등을 줄이기 위해 개입하기보다는, 자유시장 원리에 따라 경쟁을 유도하는 편이 더 높은 성취를 이끌 수 있음을 시사한다.
      - **(자료 6) 분석과 해석 (5점)**: 〈표 3〉에 따르면, 한계기업 비중이 높을수록 총요소생산성(TFP)이 낮아져 기술 및 제도 혁신이 저해된다. 자본이 생산성 낮은 한계기업으로 고착되면 혁신 기업으로의 자원 이동이 차단되고, 자본 재배분율이 낮아져 시장 역동성이 감소한다. 이러한 점에서 한계기업에 대한 정부 개입은 생산성 저하, 투자 위축, 경쟁 저해로 이어질 수 있어, 가계부채 문제에 대한 국가 개입에도 부정적인 논거가 될 수 있다.

      ※ 정당화에 사용한 자료(자료 1/3/4)를 반박에도 재사용한 경우 해당 자료 점수는 0점.
    band_descriptors:
      15: "세 자료 모두 정확한 해석과 함께 반박에 활용"
      12: "세 자료 활용, 그 중 한두 자료의 해석이 피상적"
      10: "두 자료만 정확히 활용"
      7: "한 자료만 정확히 활용"
      4: "반박을 시도했으나 자료 해석이 전반적으로 부정확"
      0: "반박 없음 또는 반박 자료(자료 2/5/6)를 활용하지 못함"

  - name: "글의 논리성"
    description: "글 전체의 일관성, 논리적 연결, 설득력 평가 (10점, 채점자 재량)"
    weight: 1.0
    scale_min: 0
    scale_max: 10
    guidance: |
      글 전체가 일관성을 유지하고, 논리적으로 잘 연결되며, 설득력이 있는지 평가합니다. (채점자 재량에 따라 10점 이내에서 부과)

      평가 요소:
      - 정당화와 반박의 흐름이 자연스럽게 연결되는가
      - 자료를 인용할 때 숫자·지표를 설명에 녹여내는가 (단순 나열이 아닌 논리적 활용)
      - 주장과 근거의 비율이 적절한가
      - 문장·단락 간 전환이 매끄러운가
      - 동어반복, 논리 비약, 모순된 주장이 없는가

      ※ 기술적 감점(형식 오류, 분량 미달/초과)은 별도 기준에서 처리하므로 여기서는 중복 감점하지 말 것.
    band_descriptors:
      10: "구성·논리·설득력이 모두 뛰어나며 자료를 논리적으로 엮어냄"
      8: "전반적으로 논리적이나 일부 연결이 약하거나 자료 인용이 나열식"
      6: "기본 구성은 갖추었으나 논리 비약 또는 근거 부족 존재"
      3: "구성이 불완전하고 흐름이 자주 끊김"
      0: "논리성이 전혀 확보되지 않음"

  - name: "기술적 감점"
    description: "형식 오류 및 분량 위반에 대한 감점 (최대 -25점, 0이 최고점)"
    weight: 1.0
    scale_min: -25
    scale_max: 0
    guidance: |
      감점만 적용됩니다. 0이 최고점(무감점).

      **형식 요소 (각 항목 -5점 이내, 총 -15점 이내)**:
      - 불필요한 서론 혹은 결론 부연 (최대 -5점)
      - 자료에 나와 있는 문장을 원래의 완전한 문장 형태를 유지한 채 그대로 옮겨 적음 (최대 -5점)
      - 원고지 작성법, 맞춤법, 띄어쓰기 등의 오류, 부적절하거나 부정확한 어휘·문장이 전반적으로 심각함 (최대 -5점)

      **분량 기준 (공백 포함 기준, 최대 -10점)**:
      - 340자 미만 (결시 아닌 백지 포함): 답안 내용과 관계없이 0점 부여
      - 340자 – 439자: -10점
      - 440자 – 539자: -5점
      - 540자 – 660자: 감점 없음
      - 660자 초과: -5점
    band_descriptors:
      0: "형식 오류 없음, 분량 540~660자 충족"
      -5: "경미한 형식 오류 한 가지 또는 분량 경계 이탈"
      -10: "형식 오류 둘 이상 또는 분량 미달/초과"
      -15: "형식 오류와 분량 위반이 동시에 발생"
      -25: "심각한 형식·분량 위반으로 답안의 평가 자체가 제한됨"
